{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Prompt Lab — Django</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0b0e14',
            surface: '#13161f',
            'surface-hover': '#1a1e2a',
            border: '#1e2330',
            'border-hover': '#2a3040',
            text: '#cdd6e0',
            'text-muted': '#6b7394',
            'text-dim': '#454c63',
            amber: { 400: '#f59e0b', 300: '#fbbf24', 500: '#d97706' },
            teal: '#2dd4bf',
            danger: '#f87171',
            'danger-dim': '#7f1d1d',
          },
        },
      },
    }
  </script>
  <style>
    body { background-color: #0b0e14; color: #cdd6e0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    :focus-visible { outline: 2px solid #f59e0b; outline-offset: 2px; border-radius: 4px; }
    .card { background: #13161f; border: 1px solid #1e2330; border-radius: 0.75rem; }
    .card:hover { border-color: #2a3040; box-shadow: 0 0 0 1px rgba(245,158,11,0.12); }
    input, textarea, select { background: #13161f; border: 1px solid #1e2330; color: #cdd6e0; border-radius: 0.5rem; }
    input:focus, textarea:focus, select:focus { border-color: rgba(245,158,11,0.5); outline: none; }
    pre { white-space: pre-wrap; overflow: auto; scrollbar-width: thin; scrollbar-color: #1e2330 transparent; }
    .btn-primary { background: #f59e0b; color: #0b0e14; font-weight: 600; border-radius: 0.5rem; padding: 0.625rem 1.25rem; }
    .btn-primary:hover { background: #fbbf24; }
    .btn-danger { border: 1px solid #7f1d1d; color: #f87171; border-radius: 0.5rem; padding: 0.625rem 1.25rem; }
    .btn-danger:hover { background: rgba(248,113,113,0.1); }
    .btn-ghost { color: #6b7394; border-radius: 0.5rem; padding: 0.625rem 1.25rem; }
    .btn-ghost:hover { color: #cdd6e0; }
    .tag-badge { display: inline-flex; align-items: center; border: 1px solid rgba(245,158,11,0.2); background: rgba(245,158,11,0.05); color: #f59e0b; border-radius: 9999px; padding: 0.25rem 0.75rem; font-size: 0.75rem; }
  </style>
</head>
<body class="min-h-screen antialiased">
  <header class="sticky top-0 z-50 border-b border-border bg-bg/80 backdrop-blur-md">
    <div class="mx-auto flex h-14 max-w-[64rem] items-center justify-between px-6">
      <a href="{% url 'prompt_list' %}" class="flex items-center gap-2.5 text-text no-underline">
        <span class="flex h-8 w-8 items-center justify-center rounded-lg bg-amber-400/10">⚡</span>
        <span class="text-lg font-semibold tracking-tight">Prompt Lab</span>
      </a>
      <nav class="flex gap-1">
        <a href="{% url 'prompt_list' %}" class="px-4 py-2 rounded-lg text-sm font-medium
          {% if '/prompts' in request.path or request.path == '/' %}text-amber-400 bg-amber-400/10{% else %}text-zinc-400 hover:text-zinc-200{% endif %}">
          Prompts
        </a>
        <a href="{% url 'tag_list' %}" class="px-4 py-2 rounded-lg text-sm font-medium
          {% if '/tags' in request.path %}text-amber-400 bg-amber-400/10{% else %}text-zinc-400 hover:text-zinc-200{% endif %}">
          Tags
        </a>
      </nav>
    </div>
  </header>
  <main class="mx-auto max-w-[64rem] px-6 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
